name: Update wheel data

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: wheel-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install scraper dependencies
        run: python -m pip install -r scripts/requirements.txt pytest
      - name: Run parser tests
        run: python -m pytest
      - name: Fetch official indexes
        run: python scripts/fetch_wheels.py
      - name: Validate generated data
        run: python -c "import json; from packaging.version import Version; d=json.load(open('public/data/wheels.json')); assert d['schemaVersion']==2 and d['wheelCount']==len(d['wheels']) and d['wheelCount']>0 and not any(Version(w['version']).is_prerelease for w in d['wheels'])"
      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/wheels.json; then
            echo "Wheel data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/wheels.json
          git commit -m "data: update official wheel index"
          git push
